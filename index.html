<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Testing & Monitoring Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f4f4f9;
            color: #333;
        }

        h1,
        h2 {
            color: #0056b3;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #0056b3;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .status-online {
            color: green;
            font-weight: bold;
        }

        .status-offline {
            color: #d9534f;
            font-weight: bold;
        }

        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 5px 10px;
            margin: 2px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        button:hover {
            background-color: #004494;
        }

        button.danger {
            background-color: #d9534f;
        }

        button.danger:hover {
            background-color: #c9302c;
        }

        input[type="text"] {
            width: 35px;
            padding: 3px;
            text-align: center;
            margin-right: 3px;
        }
    </style>
</head>

<body>
    <h1>🧪 Device Testing & Monitoring Dashboard</h1>

    <div class="card">
        <h2>🔌 Device Terhubung (Active & History Sessions)</h2>
        <table>
            <thead>
                <tr>
                    <th>Device ID</th>
                    <th>Socket ID</th>
                    <th>Waktu Terhubung</th>
                    <th>Uptime</th>
                    <th>Status</th>
                    <th>Aksi Kontrol</th>
                </tr>
            </thead>
            <tbody id="deviceTable">
                <tr>
                    <td colspan="6" style="text-align: center;">Belum ada device terhubung</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <div class="header-flex">
            <h2>📜 Live Event Logs</h2>
            <button class="danger" onclick="clearLogs()">Clear Logs</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Device ID</th>
                    <th>Socket ID</th>
                    <th>Event / Aksi</th>
                    <th>Detail Data</th>
                </tr>
            </thead>
            <tbody id="logTable">
                <tr>
                    <td colspan="5" style="text-align: center;">Belum ada event tercatat</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let cachedData = { devices: [], logs: [] };

        function formatUptime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${hrs}j ${mins}m ${secs}d`;
        }

        function sendCommand(socketId, action, extraData = {}) {
            socket.emit('admin_command', {
                targetSocketId: socketId,
                action: action,
                ...extraData
            });
        }

        function triggerAudio(socketId) {
            const folderInput = document.getElementById(`folder_${socketId}`);
            const trackInput = document.getElementById(`track_${socketId}`);
            sendCommand(socketId, 'playAudio', {
                folder: folderInput ? folderInput.value : '02',
                track: trackInput ? trackInput.value : '02'
            });
        }

        function clearLogs() {
            if (confirm("Apakah Anda yakin ingin menghapus semua event logs?")) {
                socket.emit('clear_logs');
            }
        }

        function renderDashboard() {
            const deviceTable = document.getElementById('deviceTable');
            if (!cachedData.devices || cachedData.devices.length === 0) {
                deviceTable.innerHTML = '<tr><td colspan="6" style="text-align: center;">Belum ada device terhubung</td></tr>';
            } else {
                deviceTable.innerHTML = cachedData.devices.map(dev => {
                    const isOnline = dev.isOnline;
                    const uptimeSeconds = isOnline ? Math.floor((Date.now() - dev.timestamp) / 1000) : 0;

                    // Ambil nilai input yang sedang diketik (jika elemennya sudah ada di DOM)
                    const existingFolder = document.getElementById(`folder_${dev.socketId}`);
                    const existingTrack = document.getElementById(`track_${dev.socketId}`);
                    const folderVal = existingFolder ? existingFolder.value : '02';
                    const trackVal = existingTrack ? existingTrack.value : '02';

                    return `
                        <tr>
                            <td><b>${dev.deviceId}</b></td>
                            <td>${dev.socketId}</td>
                            <td>${isOnline ? dev.connectedAt : '-'}</td>
                            <td class="uptime-cell" data-timestamp="${dev.timestamp}" data-online="${isOnline}">
                                ${isOnline ? formatUptime(uptimeSeconds) : '-'}
                            </td>
                            <td>
                                ${isOnline
                            ? '<span class="status-online">Online</span>'
                            : '<span class="status-offline">Offline</span>'}
                            </td>
                            <td>
                                ${isOnline ? `
                                    <button onclick="sendCommand('${dev.socketId}', 'openGate')">Open Gate</button>
                                    <button class="danger" onclick="sendCommand('${dev.socketId}', 'disallowProcess')">Disallow</button>
                                    <button onclick="sendCommand('${dev.socketId}', 'allowProcess')">Allow</button>
                                    <br style="margin: 5px 0;">
                                    <input type="text" id="folder_${dev.socketId}" value="${folderVal}" title="Folder">
                                    <input type="text" id="track_${dev.socketId}" value="${trackVal}" title="Track">
                                    <button onclick="triggerAudio('${dev.socketId}')">Play Audio</button>
                                ` : '<span style="color: gray; font-size: 12px;">Tidak tersedia (Offline)</span>'}
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            const logTable = document.getElementById('logTable');
            if (!cachedData.logs || cachedData.logs.length === 0) {
                logTable.innerHTML = '<tr><td colspan="5" style="text-align: center;">Belum ada event tercatat</td></tr>';
            } else {
                logTable.innerHTML = cachedData.logs.map(log => `
                    <tr>
                        <td>${log.time}</td>
                        <td><b>${log.deviceId}</b></td>
                        <td>${log.socketId}</td>
                        <td><b>${log.event}</b></td>
                        <td><pre style="margin:0; font-family:inherit;">${JSON.stringify(log.data, null, 2)}</pre></td>
                    </tr>
                `).join('');
            }
        }

        socket.on('update_monitoring', (data) => {
            cachedData = data;
            renderDashboard();
        });

        // Update tampilan uptime secara lokal setiap 1 detik
        setInterval(() => {
            const uptimeCells = document.querySelectorAll('.uptime-cell');
            uptimeCells.forEach(cell => {
                const isOnline = cell.getAttribute('data-online') === 'true';
                if (isOnline) {
                    const timestamp = parseInt(cell.getAttribute('data-timestamp'));
                    const uptimeSeconds = Math.floor((Date.now() - timestamp) / 1000);
                    cell.textContent = formatUptime(uptimeSeconds);
                }
            });
        }, 1000);
    </script>
</body>

</html>
