<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Device Testing & Monitoring Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f4f4f9;
            color: #333;
        }

        h1, h2 {
            color: #0056b3;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #0056b3;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .status-online {
            color: green;
            font-weight: bold;
        }

        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 5px 10px;
            margin: 2px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        button:hover {
            background-color: #004494;
        }

        button.danger {
            background-color: #d9534f;
        }

        button.danger:hover {
            background-color: #c9302c;
        }

        input[type="text"] {
            width: 35px;
            padding: 3px;
            text-align: center;
            margin-right: 3px;
        }
    </style>
</head>

<body>
    <h1>🧪 Device Testing & Monitoring Dashboard</h1>

    <div class="card">
        <h2>🔌 Device Terhubung (Active Sessions)</h2>
        <table>
            <thead>
                <tr>
                    <th>Device ID</th>
                    <th>Socket ID</th>
                    <th>Waktu Terhubung</th>
                    <th>Uptime</th>
                    <th>Status</th>
                    <th>Aksi Kontrol</th>
                </tr>
            </thead>
            <tbody id="deviceTable">
                <tr>
                    <td colspan="6" style="text-align: center;">Belum ada device terhubung</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h2>📜 Live Event Logs</h2>
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Device ID</th>
                    <th>Socket ID</th>
                    <th>Event / Aksi</th>
                    <th>Detail Data</th>
                </tr>
            </thead>
            <tbody id="logTable">
                <tr>
                    <td colspan="5" style="text-align: center;">Belum ada event tercatat</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function sendCommand(socketId, action, extraData = {}) {
            socket.emit('admin_command', {
                targetSocketId: socketId,
                action: action,
                ...extraData
            });
        }

        function triggerAudio(socketId) {
            const folderInput = document.getElementById(`folder_${socketId}`);
            const trackInput = document.getElementById(`track_${socketId}`);
            sendCommand(socketId, 'playAudio', {
                folder: folderInput.value || '02',
                track: trackInput.value || '04'
            });
        }

        socket.on('update_monitoring', (data) => {
            const deviceTable = document.getElementById('deviceTable');
            if (!data.devices || data.devices.length === 0) {
                deviceTable.innerHTML = '<tr><td colspan="6" style="text-align: center;">Belum ada device terhubung</td></tr>';
            } else {
                deviceTable.innerHTML = data.devices.map(dev => `
                    <tr>
                        <td><b>${dev.deviceId}</b></td>
                        <td>${dev.socketId}</td>
                        <td>${dev.connectedAt}</td>
                        <td>${dev.uptimeFormatted}</td>
                        <td><span class="status-online">Online</span></td>
                        <td>
                            <button onclick="sendCommand('${dev.socketId}', 'openGate')">Open Gate</button>
                            <button class="danger" onclick="sendCommand('${dev.socketId}', 'disallowProcess')">Disallow</button>
                            <button onclick="sendCommand('${dev.socketId}', 'allowProcess')">Allow</button>
                            <br style="margin: 5px 0;">
                            <input type="text" id="folder_${dev.socketId}" value="02" title="Folder">
                            <input type="text" id="track_${dev.socketId}" value="04" title="Track">
                            <button onclick="triggerAudio('${dev.socketId}')">Play Audio</button>
                        </td>
                    </tr>
                `).join('');
            }

            const logTable = document.getElementById('logTable');
            if (!data.logs || data.logs.length === 0) {
                logTable.innerHTML = '<tr><td colspan="5" style="text-align: center;">Belum ada event tercatat</td></tr>';
            } else {
                logTable.innerHTML = data.logs.map(log => `
                    <tr>
                        <td>${log.time}</td>
                        <td><b>${log.deviceId}</b></td>
                        <td>${log.socketId}</td>
                        <td><b>${log.event}</b></td>
                        <td><pre style="margin:0; font-family:inherit;">${JSON.stringify(log.data, null, 2)}</pre></td>
                    </tr>
                `).join('');
            }
        });
    </script>
</body>

</html>
